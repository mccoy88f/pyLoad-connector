<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title data-i18n="interceptTitle">Download intercepted</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .file {
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      margin: 10px 0;
      word-break: break-all;
      font-size: 12px;
      max-height: 90px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
    .buttons { flex-direction: column; }
    .buttons button { width: 100%; }
    #status a { color: var(--accent); }
  </style>
</head>
<body>
  <h1><img src="../icons/icon48.png" alt=""> <span data-i18n="interceptTitle">Download intercepted</span></h1>
  <p data-i18n="interceptQuestion">How do you want to download this file?</p>
  <div class="file" id="fileInfo"></div>
  <div class="buttons">
    <button id="pyload" class="primary" data-i18n="btnPyload">Download with pyLoad</button>
    <button id="chrome" data-i18n="btnChrome">Continue with Chrome</button>
    <button id="abort" class="danger" data-i18n="btnAbort">Cancel download</button>
  </div>
  <p id="status"></p>
  <script src="ask.js" type="module"></script>
</body>
</html>
