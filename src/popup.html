<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <title>pyLoad Connector</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { width: 340px; }
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 14px;
      font-size: 12px;
    }
    .footer a { color: var(--accent); }
  </style>
</head>
<body>
  <h1><img src="../icons/icon48.png" alt=""> pyLoad Connector</h1>

  <button id="sendTab" class="primary" style="width:100%">Invia URL della scheda corrente</button>

  <label for="links">Oppure incolla uno o più link</label>
  <textarea id="links" rows="4" placeholder="Un link per riga"></textarea>
  <div class="buttons">
    <button id="sendLinks" class="primary">Invia a pyLoad</button>
  </div>

  <div class="checkbox-row">
    <input type="checkbox" id="interceptDownloads">
    <label for="interceptDownloads">Intercetta i download di Chrome</label>
  </div>

  <p id="status"></p>

  <div class="footer">
    <a href="#" id="openOptions">Opzioni</a>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
